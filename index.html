<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vít Hitzger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="styles/style.css" rel="stylesheet">
</head>
<body>

    <div class="container">

        <img src="styles/ProfilePhoto.png" alt="Profilový obrázek" class="avatar">
        
        <h1>Vít Hitzger</h1>
        <p class="bio">IT enthusiast and CTU student</p>

        <div class="links-container">
            
            <a href="https://www.linkedin.com/in/v%C3%ADt-hitzger-682010341/" target="_blank" class="link-btn">
                My LinkedIN
            </a>
            
            <a href="resumes.html" class="link-btn">
                My Resume
            </a>
            
            <a href="javascript:void(0);" id="emailBtn" class="link-btn" onclick="zkopirujEmail('vitek.hitzger@gmail.com')">
                Contact me!<br>(vitek.hitzger@gmail.com)
            </a>
            
        </div>
        <div class="footer">
            &copy; Vít Hitzger
        </div>
    </div>

    <script>
        function zkopirujEmail(email) {
            navigator.clipboard.writeText(email)
                .then(() => {
                    const tlacitko = document.getElementById("emailBtn");
                    // Uložíme si původní HTML tlačítka (včetně <br> tagu)
                    const puvodniObsah = tlacitko.innerHTML; 
                    
                    // Změníme text a barvu pro zpětnou vazbu
                    tlacitko.innerHTML = "E-mail zkopírován! ✓";
                    tlacitko.style.backgroundColor = "#4CAF50"; // Zelená barva úspěchu
                    tlacitko.style.color = "white";
                    tlacitko.style.borderColor = "#4CAF50"; // Sladění rámečku, pokud nějaký máš

                    // Za 2 vteřiny vrátíme tlačítko do původního stavu
                    setTimeout(() => {
                        tlacitko.innerHTML = puvodniObsah;
                        tlacitko.style.backgroundColor = ""; 
                        tlacitko.style.color = "";
                        tlacitko.style.borderColor = "";
                    }, 2000);
                })
                .catch((chyba) => {
                    console.error("Kopírování selhalo:", chyba);
                    alert("Něco se pokazilo, zkopírujte prosím e-mail ručně.");
                });
        }
    </script>

</body>
</html>
