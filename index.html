<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vít Hitzger | Portfolio & Odkazy</title>
    <!-- Moderní font z Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="/styles/style.css" rel="stylesheet">
    <style>
        /* Základní nastavení a moderní tmavý gradient na pozadí */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* Hlavní kontejner pro obsah */
        .container {
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            text-align: center;
            /* Animace zobrazení při načtení */
            animation: fadeIn 1s ease-out forwards;
        }

        /* Profilový obrázek */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        /* Jméno a popisek */
        h1 {
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        p.bio {
            margin: 0 0 30px 0;
            font-size: 1rem;
            color: #b0c4de;
            font-weight: 400;
        }

        /* Kontejner na odkazy */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Styly pro jednotlivá tlačítka (Glassmorphism efekt) */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); /* Efekt matného skla */
            -webkit-backdrop-filter: blur(10px); /* Pro Safari */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Interakce po najetí myší (Hover efekt) */
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateY(-4px); /* Tlačítko povyskočí nahoru */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Patička */
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Definice animace pro načtení stránky */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Zde vlož odkaz na svou fotku místo URL z příkladu -->
        <img src="https://ui-avatars.com/api/?name=Vitek+Hitzger&background=random&size=200" alt="Profilový obrázek" class="avatar">
        
        <h1>Vít Hitzger</h1>
        <p class="bio">IT nadšenec a student ČVUT v Praze</p>

        <!-- Tady jsou tvá tlačítka -->
        <div class="links-container">
            <a href="https://github.com/vitekhitzger" target="_blank" class="link-btn">
                My GitHub
            </a>
            
            <a href="#" class="link-btn">
                My Resume (CV)
            </a>
            
            <a href="#" class="link-btn">
                My Projects
            </a>
            
            <a href="mailto:tvuj@email.cz" class="link-btn">
                Contact me!
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Vít Hitzger
        </div>
    </div>

</body>
</html>
